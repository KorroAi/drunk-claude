name: Skill Validation

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check LICENSE exists
        run: test -f LICENSE && echo "LICENSE OK" || (echo "MISSING LICENSE" && exit 1)

      - name: Validate SKILL.md structure
        run: |
          grep -q "^---$" SKILL.md && echo "Frontmatter open OK" || (echo "Missing frontmatter ---" && exit 1)
          grep -q "^name:" SKILL.md && echo "name field OK" || (echo "Missing name in frontmatter" && exit 1)
          grep -q "^description:" SKILL.md && echo "description field OK" || (echo "Missing description in frontmatter" && exit 1)

      - name: Validate evals.json
        run: python -c "import json; json.load(open('evals/evals.json')); print('evals.json valid')"

      - name: Check README size
        run: |
          lines=$(wc -l < README.md)
          test "$lines" -gt 20 && echo "README OK ($lines lines)" || (echo "README too short" && exit 1)
